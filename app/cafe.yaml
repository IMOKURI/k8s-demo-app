---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coffee
  template:
    metadata:
      labels:
        app: coffee
    spec:
      containers:
        - name: coffee
          image: nginxdemos/nginx-hello:plain-text
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: coffee-svc
spec:
  # type: NodePort
  # type: LoadBalancer
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: coffee

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffee-ingress
  annotations:
    cert-manager.io/cluster-issuer: server-cert-cluster-issuer
spec:
  ingressClassName: nginx
  rules:
    - host: cafe.hplab.imokuri.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coffee-svc
                port:
                  number: 8080
  tls:
    - hosts:
        - cafe.hplab.imokuri.dev
      secretName: cafe-hplab-imokuri-dev-tls
