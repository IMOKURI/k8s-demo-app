apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cafe-hplab-imokuri-dev
spec:
  secretName: cafe-hplab-imokuri-dev-tls

  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048

  duration: 2160h # 90d
  renewBefore: 360h # 15d

  isCA: false
  usages:
    - server auth
    - client auth

  subject:
    organizations:
      - TA

  commonName: hplab.imokuri.dev

  dnsNames:
    - cafe.hplab.imokuri.dev

  issuerRef:
    name: server-cert-cluster-issuer
    kind: ClusterIssuer
    group: cert-manager.io
